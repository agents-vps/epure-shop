<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Administration Épure</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <a href="#main" class="skip-link">Aller au contenu</a>

  <main id="main">
    <div class="admin-login" data-component="admin-login">
      <div class="admin-login__card">
        <div class="admin-login__logo">Épure</div>
        <h1 class="admin-login__title">Administration</h1>
        <p class="admin-login__subtitle">Connectez-vous pour gérer votre boutique</p>

        <form action="/admin/dashboard" method="post" name="login-form" id="login-form" autocomplete="on" novalidate>
          <div class="form-group u-mb-5" >
            <label class="form-label" for="login-email">Email</label>
            <input
              type="email"
              id="login-email"
              name="email"
              class="form-input"
              placeholder="vous@epure-boutique.fr"
              autocomplete="email"
              required
              aria-required="true"
            >
          </div>

          <div class="form-group u-mb-3" >
            <label class="form-label" for="login-password">Mot de passe</label>
            <input
              type="password"
              id="login-password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
              aria-required="true"
            >
          </div>

          <div class="u-flex u-items-center u-justify-between u-mb-6" >
            <label class="checkbox">
              <input type="checkbox" class="checkbox__input" name="remember" id="login-remember">
              <span>Se souvenir de moi</span>
            </label>
            <a class="u-text-sm" href="/admin/forgot-password" >Mot de passe oublié ?</a>
          </div>

          <button type="submit" class="btn btn--primary u-w-full" >Se connecter</button>
        </form>
      </div>
    </div>
  </main>

  <script src="../js/ui.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
