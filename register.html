<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte — Épure</title>
  <meta name="description" content="Créez votre compte Épure pour une expérience d'achat personnalisée.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/shop.css">
</head>
<body class="auth-page" data-component="register-page">

<a href="#main" class="skip-link">Aller au contenu</a>

<main id="main">
  <div class="auth-card" data-component="register-form" data-endpoint="/api/auth/register" data-state="success">
    <!-- Logo -->
    <div class="auth-card__logo">
      <a href="index.html">Épure</a>
    </div>

    <h1 class="auth-card__title">Créer un compte</h1>
    <p class="auth-card__subtitle">Rejoignez la communauté Épure.</p>

    <!-- Loading state -->
    <div class="state-loading" data-slot="loading">
      <div class="skeleton skeleton--text skeleton--title u-mb-4" ></div>
      <div class="skeleton skeleton--text u-mb-4" ></div>
      <div class="skeleton skeleton--text u-mb-4" ></div>
      <div class="skeleton skeleton--btn u-mt-6" ></div>
    </div>

    <!-- Error state -->
    <div class="state-error" data-slot="error">
      <div class="u-flex u-items-center u-gap-2 u-mb-6 u-bg-error-light u-radius-sm">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="var(--color-error)" stroke-width="1.5"><circle cx="10" cy="10" r="9"/><path d="M7 7l6 6M13 7l-6 6"/></svg>
        <p class="u-text-sm u-fw-medium u-text-error"  data-slot="error-message">Cet email est déjà utilisé. Veuillez vous connecter.</p>
      </div>
    </div>

    <!-- Content state (form) -->
    <div class="state-content">
      <form action="/api/auth/register" method="POST" novalidate>
        <div class="u-grid u-gap-4 u-grid-cols-2 u-mb-4" >
          <div class="form-group">
            <label class="form-label" for="register-firstname">Prénom</label>
            <input type="text" id="register-firstname" name="firstname" class="form-input" required autocomplete="given-name">
          </div>
          <div class="form-group">
            <label class="form-label" for="register-lastname">Nom</label>
            <input type="text" id="register-lastname" name="lastname" class="form-input" required autocomplete="family-name">
          </div>
        </div>

        <div class="form-group u-mb-4" >
          <label class="form-label" for="register-email">Email</label>
          <input type="email" id="register-email" name="email" class="form-input" required autocomplete="email" placeholder="vous@exemple.com">
        </div>

        <div class="form-group u-mb-4" >
          <label class="form-label" for="register-password">Mot de passe</label>
          <div class="u-relative" >
            <input type="password" id="register-password" name="password" class="form-input" required autocomplete="new-password" placeholder="Minimum 8 caractères" minlength="8">
            <button type="button" class="password-toggle u-text-muted" data-action="toggle-password" data-target="register-password" aria-label="Afficher le mot de passe">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 4C4 4 1 10 1 10s3 6 9 6 9-6 9-6-3-6-9-6z"/><circle cx="10" cy="10" r="3"/></svg>
            </button>
          </div>
          <span class="form-hint">8 caractères minimum, incluant une majuscule et un chiffre.</span>
        </div>

        <div class="form-group u-mb-6" >
          <label class="form-label" for="register-confirm-password">Confirmer le mot de passe</label>
          <input type="password" id="register-confirm-password" name="confirm_password" class="form-input" required autocomplete="new-password" placeholder="Répétez votre mot de passe" minlength="8">
        </div>

        <label class="checkbox u-mb-6" >
          <input type="checkbox" class="checkbox__input" name="terms" required>
          <span class="u-text-sm" >J'accepte les <a href="#">conditions générales</a> et la <a href="#">politique de confidentialité</a>.</span>
        </label>

        <button type="submit" class="btn btn--primary u-w-full"  data-action="register-submit">
          Créer mon compte
        </button>
      </form>
    </div>

    <div class="auth-card__footer">
      <p>Déjà un compte&nbsp;? <a href="login.html">Se connecter</a></p>
    </div>
  </div>
</main>

<!-- ═══ TEMPLATES ═══ -->
<template id="template-register-loading">
  <div class="u-text-center">
    <div class="skeleton skeleton--text skeleton--title u-mb-4" ></div>
    <div class="skeleton skeleton--text u-mb-4" ></div>
    <div class="skeleton skeleton--text u-mb-4" ></div>
    <div class="skeleton skeleton--btn u-mx-auto" ></div>
  </div>
</template>

<script src="js/ui.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
